<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Football Predictor V9.0{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-trophy-fill text-warning me-2"></i>
        <span>FP <span class="text-warning">BETA</span></span>
    </div>
    <hr class="sidebar-divider">
    <nav class="sidebar-nav">
        <a href="/learning" class="nav-link {% if active_page == 'learning' %}active{% endif %}">
            <i class="bi bi-cpu-fill"></i> Aprendizaje
        </a>
        <a href="/statistics" class="nav-link {% if active_page == 'statistics' %}active{% endif %}">
            <i class="bi bi-graph-up"></i> Estadísticas
        </a>
        <a href="/ranking" class="nav-link {% if active_page == 'ranking' %}active{% endif %}">
            <i class="bi bi-bar-chart-fill"></i> Ranking Variables
        </a>
        <a href="/data-updates" class="nav-link {% if active_page == 'data_updates' %}active{% endif %}">
            <i class="bi bi-cloud-arrow-down-fill"></i> Data Updates
        </a>
        <a href="/database" class="nav-link {% if active_page == 'database' %}active{% endif %}">
            <i class="bi bi-database-fill"></i> Base de Datos
        </a>
        <a href="/system-health" class="nav-link {% if active_page == 'system_health' %}active{% endif %}">
            <i class="bi bi-heart-pulse-fill"></i> System Health
        </a>
        <a href="/logs" class="nav-link {% if active_page == 'logs' %}active{% endif %}">
            <i class="bi bi-terminal-fill"></i> Logs
        </a>
    </nav>
    <div class="sidebar-footer">
        <span class="badge bg-warning text-dark">V9.0 Beta</span>
        <small class="text-muted ms-2">Training Mode</small>
    </div>
</div>

<!-- Main Content -->
<div class="main-content" id="main-content">
    <!-- Top bar -->
    <div class="topbar">
        <button class="btn btn-sm btn-outline-secondary me-3" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <span class="topbar-title">{% block page_title %}Football Predictor{% endblock %}</span>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="badge bg-dark text-warning border border-warning" style="font-size:0.75rem">
                <i class="bi bi-activity me-1"></i>Training Mode
            </span>
            <button class="btn btn-sm btn-outline-warning" onclick="refreshData()" title="Actualizar página">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- Page Content -->
    <div class="content-area">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
