<!-- Partial: Team Stats Form. Used with prefix injection via JS -->
<div class="row g-2">
    <div class="col-6">
        <label style="font-size:0.75rem">ELO Global</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="elo_global" placeholder="1500" min="800" max="2200" step="1">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">ELO 12 meses</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="elo_12months" placeholder="1500" min="800" max="2200" step="1">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">xG prom.</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="xg_avg" placeholder="1.20" min="0.1" max="5" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">xGA prom.</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="xga_avg" placeholder="1.20" min="0.1" max="5" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Goles/partido</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="goals_per_game" placeholder="1.20" min="0" max="5" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Goles recibidos/p</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="goals_conceded_per_game" placeholder="1.20" min="0" max="5" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Forma 5 (0-1)</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="form_5" placeholder="0.50" min="0" max="1" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Forma 10 (0-1)</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="form_10" placeholder="0.50" min="0" max="1" step="0.01">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Lesiones clave</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="injuries_key" placeholder="0" min="0" max="11" step="1">
    </div>
    <div class="col-6">
        <label style="font-size:0.75rem">Cuota (prob.)</label>
        <input type="number" class="form-control form-control-sm stats-field" data-field="odds_home_prob" placeholder="0.45" min="0.05" max="0.95" step="0.01">
    </div>
</div>
